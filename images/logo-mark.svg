<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <clipPath id="cc">
      <circle cx="50" cy="50" r="46" />
    </clipPath>
    <clipPath id="th">
      <rect x="0" y="0" width="100" height="50" />
    </clipPath>
    <clipPath id="bh">
      <rect x="0" y="50" width="100" height="50" />
    </clipPath>
  </defs>
  <!-- Red top -->
  <circle cx="50" cy="50" r="46" fill="#C41F14" clip-path="url(#th)" />
  <!-- Dark bottom -->
  <circle cx="50" cy="50" r="46" fill="#2D2D2D" clip-path="url(#bh)" />
  <!-- Mountain shape -->
  <polygon points="4,72 26,38 40,52 56,22 76,46 96,44 96,96 4,96"
    fill="#2D2D2D" clip-path="url(#cc)" />
  <!-- White slash -->
  <polygon points="54,14 64,14 38,62 28,62"
    fill="white" clip-path="url(#cc)" />
  <!-- Red tip -->
  <polygon points="58,6 72,6 72,22 64,14 54,14"
    fill="#C41F14" clip-path="url(#cc)" />
  <!-- Echo -->
  <polygon points="27,63 33,63 20,82 14,82"
    fill="white" opacity="0.45" clip-path="url(#cc)" />
</svg>
