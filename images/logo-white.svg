<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" fill="none">
  <defs>
    <!-- Circle clip for the mark -->
    <clipPath id="markClip">
      <circle cx="45" cy="45" r="38" />
    </clipPath>
    <clipPath id="topHalf">
      <rect x="0" y="0" width="90" height="45" />
    </clipPath>
    <clipPath id="bottomHalf">
      <rect x="0" y="45" width="90" height="45" />
    </clipPath>
  </defs>

  <!-- ── LOGO MARK ── -->
  <!-- Red top semicircle -->
  <circle cx="45" cy="45" r="38" fill="#E8281C" clip-path="url(#topHalf)" />
  <!-- White-tinted bottom semicircle (subtle on dark bg) -->
  <circle cx="45" cy="45" r="38" fill="rgba(255,255,255,0.12)" clip-path="url(#bottomHalf)" />

  <!-- Chart / mountain shape (translucent white) -->
  <polygon
    points="10,68  24,42  34,54  46,28  62,50  74,47  74,80  10,80"
    fill="rgba(255,255,255,0.2)"
    clip-path="url(#markClip)"
  />

  <!-- Main white lightning slash -->
  <polygon
    points="50,16  60,16  38,62  28,62"
    fill="white"
    clip-path="url(#markClip)"
  />

  <!-- Red arrowhead tip -->
  <polygon
    points="54,8  68,8  68,24  60,16  50,16"
    fill="#E8281C"
    clip-path="url(#markClip)"
  />

  <!-- Echo / secondary slash -->
  <polygon
    points="27,64  33,64  20,82  14,82"
    fill="white"
    opacity="0.35"
    clip-path="url(#markClip)"
  />

  <!-- Circle border ring (white) -->
  <circle cx="45" cy="45" r="37" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" fill="none" />

  <!-- ── WORDMARK ── -->
  <!-- MED PRO DOJO in white, bold condensed -->
  <text
    x="100"
    y="34"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="22"
    font-weight="900"
    fill="white"
    letter-spacing="2"
  >MED PRO DOJO</text>

  <!-- Tagline underneath -->
  <text
    x="101"
    y="54"
    font-family="'Arial', sans-serif"
    font-size="9"
    font-weight="400"
    fill="rgba(255,255,255,0.5)"
    letter-spacing="3.5"
  >PRACTICE SYSTEMS</text>
</svg>
